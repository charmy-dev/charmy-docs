name: Deploy Sphinx Documentation

on:
  # 当主分支有推送时触发
  push:
    branches:
      - main
      # 如果你有 dev/develop 分支需要触发，取消注释下面一行
      # - dev

  # 允许手动触发
  workflow_dispatch:

# 部署并发控制，防止多个部署同时运行
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 需要写入内容权限（推送到 gh-pages 分支）
      pages: write       # 需要操作 Pages 权限
      id-token: write    # 需要生成 ID Token

    steps:
      # 步骤 1: 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 确保获取完整的提交历史

      # 步骤 2: 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 步骤 3: 安装依赖
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

          pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints sphinx-copybutton
          
          git clone https://github.com/charmy-dev/charmy.git
          cd charmy && pip install .
          cd ..

      # 步骤 4: 生成 HTML 文档
      - name: Build HTML documentation
        run: |
          python build.py

      # 步骤 5: 部署到 gh-pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # 文档源目录（确认是否只部署中文文档）
          publish_dir: ./build/html/zh_CN
          # 提交信息
          commit_message: "Deploy Sphinx docs for ${{ github.sha }}"
          # 自动使用 GITHUB_TOKEN（已通过 permissions 授权）
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 部署目标分支
          publish_branch: gh-pages